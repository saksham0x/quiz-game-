<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Quiz Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="main">
        <button class="back">
  <span class="shadow"></span>
  <span class="edge"></span>
  <span class="front text"> back
  </span>
</button>
        <section id="quiz">
            <div class="box">
                <div class="clock">
                    <span class="timer-label">TIME LEFT</span>
                    <h4 id="timerText">15:00</h4>
                </div>

                <div class="progress-container">
                    <div class="progress-fill" style="width: 20%;"></div>
                </div>

                <h1 class="que">What is a Noun?</h1>

                <div class="options-container">
                    <button class="option-3d">
                        <div class="option-base"></div>
                        <div class="option-top">
                            <span class="label">A</span>
                            <span class="text">A person, place, or thing</span>
                        </div>
                    </button>

                    <button class="option-3d">
                        <div class="option-base"></div>
                        <div class="option-top">
                            <span class="label">B</span>
                            <span class="text">An action word</span>
                        </div>
                    </button>

                    <button class="option-3d">
                        <div class="option-base"></div>
                        <div class="option-top">
                            <span class="label">C</span>
                            <span class="text">Describes a verb</span>
                        </div>
                    </button>

                    <button class="option-3d">
                        <div class="option-base"></div>
                        <div class="option-top">
                            <span class="label">D</span>
                            <span class="text">None of the above</span>
                        </div>
                    </button>
                </div>

                <div class="nav-container">
                    <button class="nav-btn-3d">
                        <div class="nav-base"></div>
                        <div class="nav-top">❮ PREV</div>
                    </button>
                    <button class="nav-btn-3d">
                        <div class="nav-base"></div>
                        <div class="nav-top">NEXT ❯</div>
                    </button>
                </div>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
